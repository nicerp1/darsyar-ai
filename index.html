<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>درسیار | دستیار تحصیلی هوشمند</title>
    <link rel="stylesheet" href="fonts/kalameh.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="درسیار">
    <link rel="apple-touch-icon" href="icons/icon-512.png">
    <link rel="manifest" href="manifest.json">
</head>
<body>

<div class="login-overlay" id="loginOverlay">
    <div class="login-card">
        <img src="images/logo.jpg" alt="درسیار" style="width:70px;height:70px;border-radius:50%;object-fit:cover;display:block;margin:0 auto 1.5rem;">
        <h2>درسیار</h2>
        <p class="login-subtitle">دستیار تحصیلی هوشمند</p>
        
        <div id="loginForm">
            <div class="input-group"><label>نام کاربری</label><input type="text" id="loginUsername" placeholder="admin"></div>
            <div class="input-group"><label>رمز عبور</label><input type="password" id="loginPassword" placeholder="1234"></div>
            <button class="btn btn-primary btn-block" id="loginSubmitBtn" onclick="
                console.log('Button clicked via onclick');
                Auth.login(document.getElementById('loginUsername').value, document.getElementById('loginPassword').value);
            "><span class="material-symbols-outlined">login</span> ورود</button>
            <p style="text-align:center;margin-top:1rem;font-size:0.85rem;">حساب کاربری ندارید؟ <a href="#" onclick="event.preventDefault(); Auth.showRegisterForm();" style="color:var(--primary);font-weight:600;">ثبت‌نام کنید</a></p>
        </div>
        
        <div id="registerForm" style="display:none;">
            <div class="input-group"><label>👤 نام کاربری *</label><input type="text" id="regUsername" placeholder="حداقل ۳ کاراکتر"></div>
            <div class="input-group"><label>📧 ایمیل *</label><input type="email" id="regEmail" placeholder="example@mail.com"></div>
            <div class="input-group"><label>👤 نام نمایشی</label><input type="text" id="regName" placeholder="اختیاری"></div>
            <div class="input-group"><label>🔒 رمز عبور *</label><input type="password" id="regPassword" placeholder="حداقل ۴ کاراکتر"></div>
            <div class="input-group"><label>🔒 تکرار رمز عبور *</label><input type="password" id="regPasswordConfirm" placeholder="تکرار رمز عبور"></div>
            <button class="btn btn-primary btn-block" id="registerSubmitBtn" onclick="
                console.log('Register button clicked via onclick');
                Auth.register(document.getElementById('regUsername').value, document.getElementById('regEmail').value, document.getElementById('regPassword').value, document.getElementById('regPasswordConfirm').value, document.getElementById('regName').value);
            "><span class="material-symbols-outlined">person_add</span> ثبت‌نام</button>
            <p style="text-align:center;margin-top:1rem;font-size:0.85rem;">قبلاً ثبت‌نام کرده‌اید؟ <a href="#" onclick="event.preventDefault(); Auth.showLoginForm();" style="color:var(--primary);font-weight:600;">ورود</a></p>
        </div>
        
        <p class="login-hint" style="margin-top:1rem;">admin / 1234 (برای تست)</p>
    </div>
</div>

<div class="app-container" id="appContainer">
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="App.toggleSidebar()"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header"><img src="images/logo.jpg" alt="درسیار" style="width:36px;height:36px;border-radius:8px;object-fit:cover;"><span class="sidebar-title">درسیار</span></div>
        <nav class="sidebar-nav" id="sidebarNav">
            <button class="sidebar-item active" data-section="home"><span class="material-symbols-outlined sidebar-icon">dashboard</span> داشبورد</button>
            <button class="sidebar-item" data-section="pomodoro"><span class="material-symbols-outlined sidebar-icon">timer</span> پومودورو</button>
            <button class="sidebar-item" data-section="flashcards"><span class="material-symbols-outlined sidebar-icon">style</span> فلش‌کارت</button>
            <button class="sidebar-item" data-section="writing"><span class="material-symbols-outlined sidebar-icon">edit_note</span> انشانویسی</button>
            <button class="sidebar-item" data-section="research"><span class="material-symbols-outlined sidebar-icon">biotech</span> تحقیق</button>
            <button class="sidebar-item" data-section="ai-assistant"><span class="material-symbols-outlined sidebar-icon">smart_toy</span> دستیار هوش مصنوعی</button>
            <button class="sidebar-item" data-section="stats"><span class="material-symbols-outlined sidebar-icon">bar_chart</span> آمار</button>
            <button class="sidebar-item" data-section="gamification"><span class="material-symbols-outlined sidebar-icon">trophy</span> دستاوردها</button>
            <button class="sidebar-item" data-section="schedule"><span class="material-symbols-outlined sidebar-icon">calendar_month</span> برنامه هفتگی</button>
            <button class="sidebar-item" data-section="exams"><span class="material-symbols-outlined sidebar-icon">assignment</span> آزمون‌ها</button>
            <button class="sidebar-item" data-section="calculator"><span class="material-symbols-outlined sidebar-icon">calculate</span> محاسبه درصد</button>
            <button class="sidebar-item admin-only" data-section="admin" style="display:none;"><span class="material-symbols-outlined sidebar-icon">settings</span> مدیریت</button>
        </nav>
        <div class="sidebar-footer"><button class="btn btn-sm btn-block" onclick="Auth.logout()"><span class="material-symbols-outlined">logout</span> خروج</button></div>
    </aside>
    <div class="main-wrapper" id="mainWrapper">
        <header class="header">
            <div class="header-left"><button class="hamburger" onclick="App.toggleSidebar()"><span class="material-symbols-outlined">menu</span></button><div class="breadcrumb"><span id="breadcrumbTitle">داشبورد</span></div></div>
            <div class="header-right"><button class="theme-toggle" onclick="App.toggleTheme()" id="themeToggle"><span class="material-symbols-outlined">dark_mode</span></button><button class="btn btn-sm btn-accent" onclick="Subscription.show()"><span class="material-symbols-outlined">star</span> اشتراک</button><div id="levelDisplay" class="level-badge">🏆 سطح ۱</div><span id="userDisplayName" style="cursor:pointer;font-weight:500;" onclick="Profile.show()"></span><span id="userRoleBadge" class="badge"></span></div>
        </header>
        <main class="main-content">
            <div class="section active" id="section-home"><div id="dashboardContainer"></div></div>
            <div class="section" id="section-pomodoro"><div class="card"><p>پومودورو</p></div></div>
            <div class="section" id="section-flashcards"><div id="flashcardsContainer"></div></div>
            <div class="section" id="section-writing"><div id="writingContainer"></div></div>
            <div class="section" id="section-research"><div id="researchContainer"></div></div>
            <div class="section" id="section-stats"></div>
            <div class="section" id="section-gamification"></div>
            <div class="section" id="section-ai-assistant" style="margin:-1.5rem;height:calc(100vh - 56px);overflow:hidden;"><div id="aiAssistantContainer" style="height:100%;"></div></div>
            <div class="section" id="section-calculator"></div>
            <div class="section" id="section-schedule"></div>
            <div class="section" id="section-exams"><div id="examsList" class="grid-2"></div><div id="examTakingArea" style="display:none;"></div></div>
            <div class="section" id="section-admin"></div>
        </main>
    </div>
</div>

<div id="pdfReport" style="display:none;"><div class="pdf-header"><h1>📊 گزارش درسیار</h1><p id="pdfDate"></p><div id="pdfContent"></div></div></div>
<div id="modalContainer"></div>

<script src="js/default-content.js"></script>
<script src="data/storage.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/profile.js"></script>
<script src="js/subscription.js"></script>
<script src="js/pomodoro.js"></script>
<script src="js/flashcards.js"></script>
<script src="js/ai-writing.js"></script>
<script src="js/ai-research.js"></script>
<script src="js/stats.js"></script>
<script src="js/gamification.js"></script>
<script src="js/ai-assistant.js"></script>
<script src="js/schedule.js"></script>
<script src="js/exams.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/admin.js"></script>
<script src="js/app.js"></script>

</body>
</html>
